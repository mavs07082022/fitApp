<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>FitTrack Pro · Download App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: #0a0a12;
            color: #f0f0f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background-image: radial-gradient(circle at 20% 50%, #1a1a2e 0%, #0a0a12 70%);
        }

        .download-page {
            max-width: 480px;
            width: 100%;
            background: #14141e;
            border-radius: 40px;
            padding: 40px 28px 36px;
            border: 1px solid #2a2a40;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8);
            position: relative;
            overflow: hidden;
        }

        .app-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #6C63FF, #8b7fff);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 42px;
            font-weight: 800;
            color: white;
            margin: 0 auto 16px;
            box-shadow: 0 12px 30px rgba(108, 99, 255, 0.3);
        }

        h1 {
            text-align: center;
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        h1 span {
            color: #6C63FF;
        }

        .subtitle {
            text-align: center;
            color: #8a8aaa;
            font-size: 15px;
            margin: 6px 0 28px;
        }

        .feature-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 32px;
        }

        .feature-item {
            background: #1c1c2a;
            padding: 14px 12px;
            border-radius: 16px;
            text-align: center;
            border: 1px solid #28283e;
        }

        .feature-item .icon {
            font-size: 24px;
            display: block;
            margin-bottom: 4px;
        }

        .feature-item .label {
            font-size: 12px;
            color: #b0b0cc;
            font-weight: 500;
        }

        .install-section {
            background: #1a1a28;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 24px;
            border: 1px solid #2a2a42;
        }

        .install-section h3 {
            font-size: 15px;
            color: #c0c0dd;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .install-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #6C63FF, #5a52e0);
            color: white;
            border: none;
            border-radius: 60px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.25s;
            box-shadow: 0 8px 24px rgba(108, 99, 255, 0.35);
        }

        .install-btn:active {
            transform: scale(0.96);
        }

        .install-btn .badge {
            background: rgba(255, 255, 255, 0.2);
            padding: 2px 12px;
            border-radius: 40px;
            font-size: 11px;
            font-weight: 600;
        }

        .platform-buttons {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }

        .platform-btn {
            flex: 1;
            padding: 12px;
            background: #222236;
            border: 1px solid #3a3a56;
            border-radius: 16px;
            color: #b0b0d0;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            text-align: center;
        }

        .platform-btn.active {
            border-color: #6C63FF;
            background: #2a2a48;
            color: white;
        }

        .instructions {
            background: #0e0e1a;
            border-radius: 16px;
            padding: 16px 18px;
            margin-top: 16px;
            border-left: 4px solid #6C63FF;
        }

        .instructions p {
            font-size: 13px;
            color: #8a8aaa;
            line-height: 1.6;
        }

        .instructions strong {
            color: #d0d0ee;
        }

        .version-info {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            font-size: 12px;
            color: #4a4a66;
            border-top: 1px solid #1e1e32;
            padding-top: 16px;
        }

        .qr-code {
            display: flex;
            justify-content: center;
            margin: 16px 0;
        }

        .qr-placeholder {
            background: white;
            padding: 12px;
            border-radius: 16px;
            display: inline-block;
        }

        .qr-placeholder svg {
            width: 100px;
            height: 100px;
        }

        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 8px 24px rgba(108, 99, 255, 0.35); }
            50% { box-shadow: 0 8px 40px rgba(108, 99, 255, 0.6); }
        }
        .install-btn {
            animation: pulse-glow 2.5s infinite;
        }

        .status-msg {
            text-align: center;
            font-size: 13px;
            color: #5a5a7a;
            margin-top: 8px;
            min-height: 20px;
        }
        .status-msg.success {
            color: #4ade80;
        }

        @media (max-width: 420px) {
            .download-page { padding: 28px 16px 30px; }
            .feature-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
            .feature-item { padding: 10px 8px; }
            .install-btn { font-size: 16px; padding: 16px; }
        }
    </style>
</head>

        // ============================================================
        // Platform Functions
        // ============================================================

        function setPlatform(platform) {
            currentPlatform = platform;
            document.querySelectorAll('.platform-btn').forEach(function(btn) {
                btn.classList.remove('active');
            });
            if (platform === 'ios') {
                document.getElementById('iosBtn').classList.add('active');
                document.getElementById('platformBadge').textContent = 'iOS';
                document.getElementById('installBtnText').textContent = '📲 Install on iOS';
                document.getElementById('instructionText').innerHTML = '<strong>📱 On iPhone/iPad:</strong> Tap "Install on iOS" → Use Safari\'s <strong>"Add to Home Screen"</strong> feature.';
            } else if (platform === 'android') {
                document.getElementById('androidBtn').classList.add('active');
                document.getElementById('platformBadge').textContent = 'Android';
                document.getElementById('installBtnText').textContent = '📥 Download App';
                document.getElementById('instructionText').innerHTML = '<strong>🤖 On Android:</strong> Tap "Download App" → Open the file → Tap <strong>"Install"</strong> → Open from home screen.';
            } else {
                document.getElementById('otherBtn').classList.add('active');
                document.getElementById('platformBadge').textContent = 'Web';
                document.getElementById('installBtnText').textContent = '🌐 Open App';
                document.getElementById('instructionText').innerHTML = '<strong>🌐 Other devices:</strong> Use your browser to access the app directly.';
            }
        }

        // ============================================================
        // Download Logic
        // ============================================================

        function downloadAndInstall() {
            if (currentPlatform === 'ios') {
                // iOS - Open in new tab for Add to Home Screen
                var appHTML = atob(APP_BASE64);
                var win = window.open('', '_blank');
                if (win) {
                    win.document.write(appHTML);
                    win.document.close();
                    showStatus('📲 In the new window, tap Share → Add to Home Screen', 'success');
                } else {
                    showStatus('⚠️ Please allow popups or use Safari\'s "Add to Home Screen"', '');
                }
            } else if (currentPlatform === 'android') {
                // Android - Download the app
                var appHTML = atob(APP_BASE64);
                var blob = new Blob([appHTML], { type: 'text/html' });
                var url = URL.createObjectURL(blob);
                
                var link = document.createElement('a');
                link.href = url;
                link.download = 'fittrack-app.html';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                
                setTimeout(function() {
                    URL.revokeObjectURL(url);
                }, 5000);
                
                showStatus('✅ Download started! Open the file to install.', 'success');
            } else {
                // Other - Open in new tab
                var appHTML = atob(APP_BASE64);
                var win = window.open('', '_blank');
                if (win) {
                    win.document.write(appHTML);
                    win.document.close();
                }
            }
        }

        function showStatus(msg, type) {
            var el = document.getElementById('statusMessage');
            el.textContent = msg;
            el.className = 'status-msg' + (type ? ' ' + type : '');
        }

        // ============================================================
        // Platform Detection
        // ============================================================

        function detectPlatform() {
            var ua = navigator.userAgent || '';
            if (/iPad|iPhone|iPod/.test(ua)) {
                setPlatform('ios');
            } else if (/Android/.test(ua)) {
                setPlatform('android');
            } else {
                setPlatform('other');
            }
        }

        // Initialize
        detectPlatform();
        console.log('🚀 FitTrack Pro ready!');
    </script>

</body>
</html>
